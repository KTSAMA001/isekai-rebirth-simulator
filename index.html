<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一个可离线安装的异世界人生推演模拟器。" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="异世重生" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>异世界重生模拟器</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<pre style="color:red;padding:20px;background:#111;font-size:14px;white-space:pre-wrap">JS Error: ' + msg + '\n' + src + ':' + line + '\n' + (err && err.stack ? err.stack : '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<pre style="color:red;padding:20px;background:#111;font-size:14px;white-space:pre-wrap">Unhandled Promise: ' + e.reason + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
